<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Admin Dashboard</title>
</head>
<body>
    <div class="container">
        <div class="dashboard">
            <div class="logo">Dashboard</div>
            <ul class="navigation">
                <li><img class="white" src="./icons/home.svg" alt=""><a href="">Home</a></li>
                <li><a href=""><img src="./icons/card-account-details-outline.svg" alt="">Profile</a></li>
                <li><a href=""><img src="./icons/message-reply.svg" alt="">Messages</a></li>
                <li><a href=""><img src="./icons/clock-time-three.svg" alt="">History</a></li>
                <li><a href=""><img src="./icons/file-multiple.svg" alt="">Tasks</a></li>
                <li><a href=""><img src="./icons/account-group.svg" alt="">Communities</a></li>
            </ul>
            <ul class="settings">
                <li><a href="">Settings</a></li>
                <li><a href="">Support</a></li>
                <li><a href="">Privacy</a></li>
            </ul>
        </div>
        <div class="header">
            <div class="header-top">
                <div class="searchbar">
                    <input type="search" id="site-search" placeholder="Search...">
                </div>
                <div class="profile-small">Profile small</div>
            </div>
            <div class="header-bot">
                <div id="profile-section">
                    User Profile
                </div>
                <div class="buttons">
                    <button>New</button>
                    <button>Upload</button>
                    <button>Share</button>
                </div>
            </div>
        </div>
        <div class="content">
            <div class="projects">
                <p id="projects-title">Your Projects</p>
                <div class="project-box"> A</div>
                <div class="project-box"> B</div>
                <div class="project-box"> C</div>
                <div class="project-box"> D</div>
                <div class="project-box"> E</div>
                <div class="project-box"> F</div>
            </div>
            <div class="sidebar">
                <div class="announcements">announcements</div>
                <div class="trending">trending</div>
            </div>
        </div>
    </div>
</body>
</html>
