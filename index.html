<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Admin Dashboard</title>
</head>
<body>
    <div class="container">
        <div class="dashboard">
            Dashboard
        </div>
        <div class="header">
            <div class="header-top">
                <div class="searchbar">
                    <input type="search" id="site-search" placeholder="Search...">
                </div>
            </div>
            <div class="header-bot">
                <div id="profile-section">
                    User Profile
                </div>
                <div class="buttons">
                    <button>New</button>
                    <button>Upload</button>
                    <button>Share</button>
                </div>
            </div>
        </div>
        <div class="content">
            <div class="projects">
                <p id="projects-title">Your Projects</p>
                <div class="project-box"> A</div>
                <div class="project-box"> B</div>
                <div class="project-box"> C</div>
                <div class="project-box"> D</div>
                <div class="project-box"> E</div>
                <div class="project-box"> F</div>
            </div>
            <div class="sidebar">
                <div class="announcements">announcements</div>
                <div class="trending">trending</div>
            </div>
        </div>
    </div>
</body>
</html>
